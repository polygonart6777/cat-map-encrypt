<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:title" content="Arnold Cat Map Explorer" />

      content="An interactive site exploring the discrete Arnold Cat Map, a chaotic transformation that illustrates image encryption."

    <meta property="og:image" content="assets/preview.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arnold Cat Map Explorer" />

      name="twitter:description"
      content="An interactive site exploring the discrete Arnold Cat Map, a chaotic transformation that illustrates image encryption."
    />
    <meta name="twitter:image" content="assets/preview.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/preview.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/preview.png" />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="3da82827-4c47-4d6d-8820-0413198c1312"
    ></script>
    <script>
      if (
        window.location.hostname !== "127.0.0.1" &&
        window.location.hostname !== "localhost"
      ) {
        const base = document.createElement("base");
        base.href = "/cat-map-encrypt/";
        document.head.prepend(base);
      }
    </script>
    <link rel="canonical" href="https://dina-buric.com/cat-map-encrypt/" />
    <script>
      MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"]],
        },
        chtml: {
          scale: 1,
          minScale: 0.5,
        },
        options: {
          renderActions: {
            addMenu: [],
          },
        },
      };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
    ></script>
  </head>
  <body>
    <!-- ── NAVIGATION ── -->
    <nav>
      <div class="nav-logo">Arnold<span>CatMap</span></div>
      <button
        class="nav-hamburger"
        id="nav-hamburger"
        aria-label="Toggle navigation"
        aria-expanded="false"
        onclick="toggleNav()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links" id="nav-links">
        <button class="nav-tab active" onclick="showPage('animation', this)">
          Animation
        </button>
        <!-- <button class="nav-tab" onclick="showPage('iterations', this)">All Iterations</button> -->
        <button class="nav-tab" onclick="showPage('about', this)">About</button>
        <button class="nav-tab" onclick="showPage('contact', this)">
          Contact
        </button>
        <button class="nav-tab" onclick="showPage('qrcode', this)">
          QR Code
        </button>
      </div>
    </nav>

    <div id="app"></div>
    <script src="js/shared.js"></script>
    <!-- <script src="js/iterations.js"></script> -->
    <script src="js/animation.js"></script>
    <script src="js/about.js"></script>
    <script src="js/hta.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/qrcode.js"></script>

    <script>
      async function loadPage(id) {
        const url = `pages/${id}.html`;
        const app = document.getElementById("app");
        const response = await fetch(url);

        if (!response.ok) {
          console.error(`Failed to load ${url} — status: ${response.status}`);
          return;
        }

        const html = await response.text();
        if (document.getElementById("page-" + id)) return;
        app.insertAdjacentHTML("beforeend", html.trim());
      }

      async function initApp() {
        // await loadPage("iterations");
        // iterOrigData = await makeDefaultImage(iterN);

        await loadPage("animation");
        updateSpeedProgress();
        initAnim();

        await loadPage("about");
        initAboutDiagram();
        if (window.MathJax) MathJax.typesetPromise();

        await loadPage("qrcode");
        initQrCode();

        await loadPage("contact");
      }

      document.addEventListener("DOMContentLoaded", initApp);
    </script>
  </body>
</html>
