<div id="page-qrcode" class="page">
  <div class="hero">
    <h1>
      <div class="hero-logo">Share<span> the Cat Map</span></div>
    </h1>
    <p class="hero-sub">
      Share the Arnold Cat Map site with others by scanning the QR code or
      copying the direct link.
    </p>
  </div>

  <div
    class="wrap"
    style="max-width: 860px; margin: 0 auto; padding: 0 2rem 5rem"
  >
    <div class="qr-card">
      <div class="qr-image-wrap">
        <img
          src="assets/qrcode.png"
          alt="QR code for the Arnold Cat Map site"
          class="qr-image"
        />
      </div>

      <div class="qr-url-wrap">
        <div class="qr-url">
          <i class="fa-solid fa-link"></i>
          <span id="qr-url-text"
            >https://polygonart6777.github.io/cat-map-encrypt/</span
          >
          <button
            class="qr-copy-btn"
            onclick="copyQrUrl()"
            aria-label="Copy URL to clipboard"
            id="qr-copy-btn"
          >
            <i class="fa-solid fa-copy"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
